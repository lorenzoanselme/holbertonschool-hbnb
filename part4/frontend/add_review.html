<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Add Review — HBnB</title>
        <link rel="icon" type="image/png" href="assets/logo.png" />
        <link rel="stylesheet" href="css/styles.css" />
        <script>
            if (localStorage.getItem("hbnb-theme") === "dark")
                document.documentElement.dataset.theme = "dark";
        </script>
    </head>
    <body>
        <div class="page-wrapper">
            <header>
                <nav class="navbar">
                    <a href="index.html" class="navbar-brand">
                        <img src="assets/logo.png" alt="HBnB" class="logo" />
                    </a>
                    <div class="navbar-top-actions">
                        <button
                            type="button"
                            class="theme-toggle"
                            aria-label="Toggle theme"
                        >
                            🌙
                        </button>
                        <button
                            type="button"
                            class="nav-menu-toggle"
                            aria-label="Open navigation menu"
                            aria-expanded="false"
                        >
                            <span class="nav-menu-toggle-bar"></span>
                            <span class="nav-menu-toggle-bar"></span>
                            <span class="nav-menu-toggle-bar"></span>
                        </button>
                    </div>
                    <div class="navbar-actions">
                        <a
                            href="profile.html?action=new-place"
                            id="nav-add-place"
                            class="login-button"
                            style="display: none"
                            >+ Add Place</a
                        >
                        <a
                            href="profile.html"
                            id="nav-profile"
                            class="login-button"
                            style="display: none"
                            >My Profile</a
                        >
                        <a
                            href="login.html"
                            id="login-link"
                            class="login-button"
                            style="display: none"
                            >Login</a
                        >
                        <button
                            type="button"
                            id="nav-logout"
                            class="login-button"
                            style="display: none"
                        >
                            Sign Out
                        </button>
                    </div>
                </nav>
            </header>

            <main>
                <a id="back-to-place" href="index.html" class="back-link"
                    >Back to place</a
                >

                <div class="add-review">
                    <div class="page-header">
                        <h1>Write a Review</h1>
                        <p id="place-label">
                            Share your experience with this place.
                        </p>
                    </div>

                    <div id="review-alert" class="alert" role="alert"></div>

                    <form id="review-form" class="form" novalidate>
                        <div class="form-group">
                            <label for="review">Your Review:</label>
                            <textarea
                                id="review"
                                name="review"
                                placeholder="Tell others about your stay…"
                                rows="5"
                                required
                            ></textarea>
                        </div>

                        <div class="form-group">
                            <label for="rating">Rating:</label>
                            <select id="rating" name="rating" required>
                                <option value="" disabled selected>
                                    Select a rating…
                                </option>
                                <option value="1">⭐ 1 — Poor</option>
                                <option value="2">⭐⭐ 2 — Fair</option>
                                <option value="3">⭐⭐⭐ 3 — Good</option>
                                <option value="4">
                                    ⭐⭐⭐⭐ 4 — Very Good
                                </option>
                                <option value="5">
                                    ⭐⭐⭐⭐⭐ 5 — Excellent
                                </option>
                            </select>
                        </div>

                        <button
                            type="submit"
                            id="submit-btn"
                            class="btn btn-primary btn-lg btn-block"
                        >
                            <span id="submit-btn-text">Submit Review</span>
                            <span
                                id="submit-spinner"
                                class="spinner"
                                style="
                                    display: none;
                                    width: 18px;
                                    height: 18px;
                                    border-width: 2px;
                                "
                                aria-hidden="true"
                            ></span>
                        </button>
                    </form>
                </div>
            </main>

            <footer>
                <p>&copy; 2026 HBnB Evolution. All rights reserved.</p>
            </footer>
        </div>

        <script type="module">
            import { initTheme } from "./js/theme.js";
            initTheme();
        </script>
        <script type="module" src="js/review.js"></script>
    </body>
</html>
