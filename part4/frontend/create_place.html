<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Add a Place — HBnB</title>
        <link rel="icon" type="image/png" href="assets/logo.png" />
        <link rel="stylesheet" href="css/styles.css" />
        <script>
            if (localStorage.getItem("hbnb-theme") === "dark")
                document.documentElement.dataset.theme = "dark";
        </script>
    </head>
    <body>
        <div class="page-wrapper">
            <header>
                <nav class="navbar">
                    <a href="index.html" class="navbar-brand">
                        <img src="assets/logo.png" alt="HBnB" class="logo" />
                    </a>
                    <div class="navbar-top-actions">
                        <button
                            type="button"
                            class="theme-toggle"
                            aria-label="Toggle theme"
                        >
                            🌙
                        </button>
                        <button
                            type="button"
                            class="nav-menu-toggle"
                            aria-label="Open navigation menu"
                            aria-expanded="false"
                        >
                            <span class="nav-menu-toggle-bar"></span>
                            <span class="nav-menu-toggle-bar"></span>
                            <span class="nav-menu-toggle-bar"></span>
                        </button>
                    </div>
                    <div class="navbar-actions">
                        <a
                            href="profile.html?action=new-place"
                            id="nav-add-place"
                            class="login-button"
                            style="display: none"
                            >+ Add Place</a
                        >
                        <a
                            href="profile.html"
                            id="nav-profile"
                            class="login-button"
                            style="display: none"
                            >My Profile</a
                        >
                        <a
                            href="login.html"
                            id="login-link"
                            class="login-button"
                            style="display: none"
                            >Login</a
                        >
                        <button
                            type="button"
                            id="nav-logout"
                            class="login-button"
                            style="display: none"
                        >
                            Sign Out
                        </button>
                    </div>
                </nav>
            </header>

            <main>
                <a href="index.html" class="back-link">Back to places</a>

                <div class="add-review" style="max-width: 680px">
                    <div class="page-header">
                        <h1 id="page-title">Add a Place</h1>
                        <p id="page-subtitle">
                            Fill in the details and your place will be live
                            instantly.
                        </p>
                    </div>

                    <div id="form-alert" class="alert" role="alert"></div>

                    <form id="place-form" class="form" novalidate>
                        <div class="form-group">
                            <label for="title"
                                >Title
                                <span style="color: var(--danger)"
                                    >*</span
                                ></label
                            >
                            <input
                                type="text"
                                id="title"
                                name="title"
                                placeholder="e.g. Cozy Studio in Paris"
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea
                                id="description"
                                name="description"
                                placeholder="Describe what makes your place special…"
                                rows="4"
                            ></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="price"
                                    >Price / night ($)
                                    <span style="color: var(--danger)"
                                        >*</span
                                    ></label
                                >
                                <input
                                    type="number"
                                    id="price"
                                    name="price"
                                    min="0"
                                    step="0.01"
                                    placeholder="0.00"
                                    required
                                />
                            </div>
                            <div class="form-group">
                                <label for="latitude"
                                    >Latitude
                                    <span style="color: var(--danger)"
                                        >*</span
                                    ></label
                                >
                                <input
                                    type="number"
                                    id="latitude"
                                    name="latitude"
                                    step="any"
                                    placeholder="48.8566"
                                    required
                                />
                            </div>
                            <div class="form-group">
                                <label for="longitude"
                                    >Longitude
                                    <span style="color: var(--danger)"
                                        >*</span
                                    ></label
                                >
                                <input
                                    type="number"
                                    id="longitude"
                                    name="longitude"
                                    step="any"
                                    placeholder="2.3522"
                                    required
                                />
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Amenities</label>
                            <div
                                id="amenities-list"
                                class="amenities-checkboxes"
                            >
                                <p
                                    style="
                                        color: var(--text-muted);
                                        font-size: 0.875rem;
                                    "
                                >
                                    Loading amenities…
                                </p>
                            </div>
                        </div>

                        <button
                            type="submit"
                            id="submit-btn"
                            class="btn btn-primary btn-lg btn-block"
                        >
                            <span id="submit-btn-text">Publish Place</span>
                            <span
                                id="submit-spinner"
                                class="spinner"
                                style="
                                    display: none;
                                    width: 18px;
                                    height: 18px;
                                    border-width: 2px;
                                "
                                aria-hidden="true"
                            ></span>
                        </button>
                    </form>
                </div>
            </main>

            <footer>
                <p>&copy; 2026 HBnB Evolution. All rights reserved.</p>
            </footer>
        </div>

        <script type="module">
            import { initTheme } from "./js/theme.js";
            initTheme();
        </script>
        <script type="module" src="js/create_place.js"></script>
    </body>
</html>
