<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; manifest-src 'self'; media-src 'self'; img-src 'self' data: blob: https:; style-src 'self' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com data:; script-src 'self' https://unpkg.com; connect-src 'self' http://localhost:5001 http://127.0.0.1:5001 https://localhost:5443 https://127.0.0.1:5443 https://nominatim.openstreetmap.org https://*.tile.openstreetmap.org; worker-src 'self' blob:;"
        />
        <title>Place Details — HBnB</title>
        <link rel="icon" type="image/png" href="assets/logo.png" />
        <link rel="stylesheet" href="css/styles.css?v=20260328r" />
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />
        <script src="js/theme-boot.js?v=20260328t"></script>
        <script src="js/runtime-config.js?v=20260328s"></script>
    </head>
    <body>
        <div class="page-wrapper">
            <header>
                <nav class="navbar">
                    <a href="index.html" class="navbar-brand">
                        <img src="assets/logo.png" alt="HBnB" class="logo" />
                    </a>
                    <div class="navbar-top-actions">
                        <button
                            type="button"
                            class="theme-toggle"
                            aria-label="Toggle theme"
                        >
                            🌙
                        </button>
                        <button
                            type="button"
                            class="nav-menu-toggle"
                            aria-label="Open navigation menu"
                            aria-expanded="false"
                        >
                            <span class="nav-menu-toggle-bar"></span>
                            <span class="nav-menu-toggle-bar"></span>
                            <span class="nav-menu-toggle-bar"></span>
                        </button>
                    </div>
                    <div class="navbar-actions">
                        <a
                            href="profile.html?action=new-place"
                            id="nav-add-place"
                            class="login-button"
                            hidden
                            >+ Add Place</a
                        >
                        <a
                            href="profile.html"
                            id="nav-profile"
                            class="login-button"
                            hidden
                            >My Profile</a
                        >
                        <a
                            href="profile.html?admin=1"
                            id="nav-admin-panel"
                            class="login-button"
                            hidden
                            >Admin Panel</a
                        >
                        <a
                            href="login.html"
                            id="login-link"
                            class="login-button"
                            hidden
                            >Login</a
                        >
                        <button
                            type="button"
                            id="nav-logout"
                            class="login-button"
                            hidden
                        >
                            Sign Out
                        </button>
                    </div>
                </nav>
            </header>

            <main>
                <!-- Place info injected here -->
                <section id="place-details">
                    <div class="spinner-wrapper">
                        <div class="spinner"></div>
                    </div>
                </section>

                <!-- Reviews injected here -->
                <section id="reviews"></section>

                <!-- Add Review — shown only when authenticated -->
                <section id="add-review" hidden>
                    <div class="detail-card add-review-card fade-in">
                        <h2 class="section-title">Add a Review</h2>

                        <div id="review-alert" class="alert" role="alert"></div>

                        <form id="review-form" class="form" novalidate>
                            <div class="form-group">
                                <label>Your Rating</label>
                                <div
                                    class="star-selector"
                                    role="group"
                                    aria-label="Rating"
                                >
                                    <button
                                        type="button"
                                        class="star-btn"
                                        data-value="1"
                                        aria-label="1 star"
                                    >
                                        ★
                                    </button>
                                    <button
                                        type="button"
                                        class="star-btn"
                                        data-value="2"
                                        aria-label="2 stars"
                                    >
                                        ★
                                    </button>
                                    <button
                                        type="button"
                                        class="star-btn"
                                        data-value="3"
                                        aria-label="3 stars"
                                    >
                                        ★
                                    </button>
                                    <button
                                        type="button"
                                        class="star-btn"
                                        data-value="4"
                                        aria-label="4 stars"
                                    >
                                        ★
                                    </button>
                                    <button
                                        type="button"
                                        class="star-btn"
                                        data-value="5"
                                        aria-label="5 stars"
                                    >
                                        ★
                                    </button>
                                </div>
                                <input
                                    type="hidden"
                                    id="rating-input"
                                    name="rating"
                                    value="0"
                                />
                            </div>

                            <div class="form-group">
                                <label for="review-text">Review:</label>
                                <textarea
                                    id="review-text"
                                    name="review-text"
                                    placeholder="Tell others about your stay…"
                                    rows="4"
                                    required
                                ></textarea>
                            </div>

                            <button
                                type="submit"
                                id="submit-btn"
                                class="btn btn-primary btn-lg btn-block"
                            >
                                <span id="submit-btn-text">Submit</span>
                                <span
                                    id="submit-spinner"
                                    class="spinner spinner-compact"
                                    hidden
                                    aria-hidden="true"
                                ></span>
                            </button>
                        </form>
                    </div>
                </section>
            </main>

            <footer>
                <p>&copy; 2026 HBnB Evolution. All rights reserved.</p>
            </footer>
        </div>

        <script type="module" src="js/theme-autoload.js?v=20260328t"></script>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script type="module" src="js/place.js?v=20260328s"></script>
    </body>
</html>
