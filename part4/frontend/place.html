<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Place Details — HBnB</title>
        <link rel="icon" type="image/png" href="assets/logo.png" />
        <link rel="stylesheet" href="css/styles.css?v=20260328r" />
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />
        <script>
            if (localStorage.getItem("hbnb-theme") === "dark")
                document.documentElement.dataset.theme = "dark";
        </script>
        <script src="js/runtime-config.js?v=20260328d"></script>
    </head>
    <body>
        <div class="page-wrapper">
            <header>
                <nav class="navbar">
                    <a href="index.html" class="navbar-brand">
                        <img src="assets/logo.png" alt="HBnB" class="logo" />
                    </a>
                    <div class="navbar-top-actions">
                        <button
                            type="button"
                            class="theme-toggle"
                            aria-label="Toggle theme"
                        >
                            🌙
                        </button>
                        <button
                            type="button"
                            class="nav-menu-toggle"
                            aria-label="Open navigation menu"
                            aria-expanded="false"
                        >
                            <span class="nav-menu-toggle-bar"></span>
                            <span class="nav-menu-toggle-bar"></span>
                            <span class="nav-menu-toggle-bar"></span>
                        </button>
                    </div>
                    <div class="navbar-actions">
                        <a
                            href="profile.html?action=new-place"
                            id="nav-add-place"
                            class="login-button"
                            style="display: none"
                            >+ Add Place</a
                        >
                        <a
                            href="profile.html"
                            id="nav-profile"
                            class="login-button"
                            style="display: none"
                            >My Profile</a
                        >
                        <a
                            href="login.html"
                            id="login-link"
                            class="login-button"
                            style="display: none"
                            >Login</a
                        >
                        <button
                            type="button"
                            id="nav-logout"
                            class="login-button"
                            style="display: none"
                        >
                            Sign Out
                        </button>
                    </div>
                </nav>
            </header>

            <main>
                <!-- Place info injected here -->
                <section id="place-details">
                    <div class="spinner-wrapper">
                        <div class="spinner"></div>
                    </div>
                </section>

                <!-- Reviews injected here -->
                <section id="reviews"></section>

                <!-- Add Review — shown only when authenticated -->
                <section id="add-review" style="display: none">
                    <div class="detail-card add-review-card fade-in">
                        <h2 class="section-title">Add a Review</h2>

                        <div id="review-alert" class="alert" role="alert"></div>

                        <form id="review-form" class="form" novalidate>
                            <div class="form-group">
                                <label>Your Rating</label>
                                <div
                                    class="star-selector"
                                    role="group"
                                    aria-label="Rating"
                                >
                                    <button
                                        type="button"
                                        class="star-btn"
                                        data-value="1"
                                        aria-label="1 star"
                                    >
                                        ★
                                    </button>
                                    <button
                                        type="button"
                                        class="star-btn"
                                        data-value="2"
                                        aria-label="2 stars"
                                    >
                                        ★
                                    </button>
                                    <button
                                        type="button"
                                        class="star-btn"
                                        data-value="3"
                                        aria-label="3 stars"
                                    >
                                        ★
                                    </button>
                                    <button
                                        type="button"
                                        class="star-btn"
                                        data-value="4"
                                        aria-label="4 stars"
                                    >
                                        ★
                                    </button>
                                    <button
                                        type="button"
                                        class="star-btn"
                                        data-value="5"
                                        aria-label="5 stars"
                                    >
                                        ★
                                    </button>
                                </div>
                                <input
                                    type="hidden"
                                    id="rating-input"
                                    name="rating"
                                    value="0"
                                />
                            </div>

                            <div class="form-group">
                                <label for="review-text">Review:</label>
                                <textarea
                                    id="review-text"
                                    name="review-text"
                                    placeholder="Tell others about your stay…"
                                    rows="4"
                                    required
                                ></textarea>
                            </div>

                            <button
                                type="submit"
                                id="submit-btn"
                                class="btn btn-primary btn-lg btn-block"
                            >
                                <span id="submit-btn-text">Submit</span>
                                <span
                                    id="submit-spinner"
                                    class="spinner"
                                    style="
                                        display: none;
                                        width: 18px;
                                        height: 18px;
                                        border-width: 2px;
                                    "
                                    aria-hidden="true"
                                ></span>
                            </button>
                        </form>
                    </div>
                </section>
            </main>

            <footer>
                <p>&copy; 2026 HBnB Evolution. All rights reserved.</p>
            </footer>
        </div>

        <script type="module">
            import { initTheme } from "./js/theme.js";
            initTheme();
        </script>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script type="module" src="js/place.js?v=20260328d"></script>
    </body>
</html>
