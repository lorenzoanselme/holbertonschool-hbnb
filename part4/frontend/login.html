<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; manifest-src 'self'; media-src 'self'; img-src 'self' data: blob: https:; style-src 'self' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com data:; script-src 'self' https://unpkg.com; connect-src 'self' http://localhost:5001 http://127.0.0.1:5001 https://localhost:5443 https://127.0.0.1:5443 https://nominatim.openstreetmap.org https://*.tile.openstreetmap.org;"
        />
        <title>Sign In — HBnB</title>
        <link rel="icon" type="image/png" href="assets/logo.png" />
        <link rel="stylesheet" href="css/styles.css?v=20260328r" />
        <script src="js/theme-boot.js?v=20260328t"></script>
        <script src="js/runtime-config.js?v=20260328s"></script>
    </head>
    <body>
        <div class="page-wrapper">
            <header>
                <nav class="navbar">
                    <a href="index.html" class="navbar-brand">
                        <img src="assets/logo.png" alt="HBnB" class="logo" />
                    </a>
                    <div class="navbar-top-actions">
                        <button
                            type="button"
                            class="theme-toggle"
                            aria-label="Toggle theme"
                        >
                            🌙
                        </button>
                        <button
                            type="button"
                            class="nav-menu-toggle"
                            aria-label="Open navigation menu"
                            aria-expanded="false"
                        >
                            <span class="nav-menu-toggle-bar"></span>
                            <span class="nav-menu-toggle-bar"></span>
                            <span class="nav-menu-toggle-bar"></span>
                        </button>
                    </div>
                    <div class="navbar-actions">
                        <a href="register.html" class="login-button">Sign up</a>
                    </div>
                </nav>
            </header>

            <main class="main-centered">
                <div class="glass login-card">
                    <div class="login-logo">
                        <p>Find your perfect stay</p>
                    </div>

                    <h1 class="login-title">Sign in to continue</h1>

                    <div
                        id="login-alert"
                        class="alert alert-error"
                        role="alert"
                    ></div>

                    <form id="login-form" novalidate>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="you@example.com"
                                autocomplete="email"
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="••••••••"
                                autocomplete="current-password"
                                required
                            />
                        </div>

                        <button
                            type="submit"
                            id="login-btn"
                            class="btn btn-primary btn-lg btn-block auth-submit-button"
                        >
                            <span id="btn-text">Sign In</span>
                            <span
                                id="btn-spinner"
                                class="spinner spinner-compact"
                                hidden
                                aria-hidden="true"
                            ></span>
                        </button>
                    </form>

                    <p class="auth-footer-copy">
                        No account yet?
                        <a
                            href="register.html"
                            class="login-button auth-footer-link"
                            >Sign up</a
                        >
                    </p>
                </div>
            </main>

            <footer>
                <p>&copy; 2026 HBnB Evolution. All rights reserved.</p>
            </footer>
        </div>

        <script type="module" src="js/login-page.js?v=20260328t"></script>
    </body>
</html>
