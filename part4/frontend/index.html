<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; manifest-src 'self'; media-src 'self'; img-src 'self' data: blob: https:; style-src 'self' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com data:; script-src 'self' https://unpkg.com; connect-src 'self' http://localhost:5001 http://127.0.0.1:5001 https://localhost:5443 https://127.0.0.1:5443 https://nominatim.openstreetmap.org https://*.tile.openstreetmap.org;"
        />
        <title>Places — HBnB</title>
        <link rel="icon" type="image/png" href="assets/logo.png" />
        <link rel="stylesheet" href="css/styles.css?v=20260328r" />
        <script src="js/theme-boot.js?v=20260328t"></script>
        <script src="js/runtime-config.js?v=20260328s"></script>
    </head>
    <body>
        <div class="page-wrapper">
            <header>
                <nav class="navbar">
                    <a href="index.html" class="navbar-brand">
                        <img src="assets/logo.png" alt="HBnB" class="logo" />
                    </a>
                    <div class="navbar-top-actions">
                        <button
                            type="button"
                            class="theme-toggle"
                            aria-label="Toggle theme"
                        >
                            🌙
                        </button>
                        <button
                            type="button"
                            class="nav-menu-toggle"
                            aria-label="Open navigation menu"
                            aria-expanded="false"
                        >
                            <span class="nav-menu-toggle-bar"></span>
                            <span class="nav-menu-toggle-bar"></span>
                            <span class="nav-menu-toggle-bar"></span>
                        </button>
                    </div>
                    <div class="navbar-actions">
                        <a
                            href="profile.html?action=new-place"
                            id="nav-add-place"
                            class="login-button"
                            hidden
                            >+ Add Place</a
                        >
                        <a
                            href="profile.html"
                            id="nav-profile"
                            class="login-button"
                            hidden
                            >My Profile</a
                        >
                        <a
                            href="login.html"
                            id="login-link"
                            class="login-button"
                            hidden
                            >Login</a
                        >
                        <button
                            type="button"
                            id="nav-logout"
                            class="login-button"
                            hidden
                        >
                            Sign Out
                        </button>
                    </div>
                </nav>
            </header>

            <main>
                <div class="page-header">
                    <h1>Available Places</h1>
                    <p id="places-subtitle">
                        Browse and book unique stays around the world.
                    </p>
                </div>

                <section class="places-explorer">
                    <div class="filter-bar places-controls">
                        <div class="filter-group">
                            <label for="price-filter"
                                >Max price per night</label
                            >
                            <select id="price-filter">
                                <option value="all">All</option>
                                <option value="50">$50</option>
                                <option value="150">$150</option>
                                <option value="300">$300</option>
                            </select>
                        </div>

                        <div class="filter-group filter-group-location">
                            <label>Your location</label>
                            <button
                                type="button"
                                id="locate-user-btn"
                                class="login-button"
                            >
                                Use my location
                            </button>
                            <p id="location-status" class="places-meta-text">
                                Distance filter is off until you share your
                                location.
                            </p>
                        </div>

                        <div class="filter-group filter-group-distance">
                            <label for="distance-filter">Distance radius</label>
                            <input
                                type="range"
                                id="distance-filter"
                                min="5"
                                max="500"
                                step="5"
                                value="75"
                                disabled
                            />
                            <p class="places-meta-text">
                                Showing places within
                                <strong id="distance-value">75 km</strong>
                            </p>
                        </div>

                        <label class="places-checkbox">
                            <input type="checkbox" id="nearby-only" disabled />
                            <span>Only show nearby stays</span>
                        </label>
                    </div>

                    <div class="places-results-bar">
                        <p id="places-results-summary" class="places-meta-text">
                            Loading places…
                        </p>
                    </div>
                </section>

                <div id="places-list">
                    <div class="spinner-wrapper">
                        <div class="spinner"></div>
                    </div>
                </div>
            </main>

            <footer>
                <p>&copy; 2026 HBnB Evolution. All rights reserved.</p>
            </footer>
        </div>

        <script type="module" src="js/theme-autoload.js?v=20260328t"></script>
        <script type="module" src="js/places.js?v=20260328s"></script>
    </body>
</html>
